name: Deploy CalendarBot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: calendarbot-deploy-main
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure dist is committed
        run: |
          if ! git diff --quiet -- dist; then
            echo "dist is out of date. Run 'npm run build' locally and commit dist before push."
            git status --short dist
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /opt/calendarbot
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            docker compose ps
